<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sri Lankan Vesak - 3D Experience</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 18%, rgba(255, 214, 102, 0.12), transparent 18%),
                radial-gradient(circle at 20% 18%, rgba(56, 189, 248, 0.12), transparent 24%),
                linear-gradient(180deg, #07020f 0%, #020205 50%, #010103 100%);
            font-family: 'Inter', sans-serif;
            touch-action: none; /* Prevent pinch zoom on mobile */
            overscroll-behavior: none;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background:
                radial-gradient(circle at 50% 12%, rgba(255, 223, 145, 0.18), transparent 14%),
                radial-gradient(circle at 82% 10%, rgba(255, 138, 75, 0.08), transparent 18%),
                radial-gradient(circle at 18% 30%, rgba(66, 153, 225, 0.08), transparent 20%);
            filter: blur(24px);
            opacity: 0.75;
        }

        body::after {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            mix-blend-mode: soft-light;
            opacity: 0.12;
            mask-image: radial-gradient(circle at center, black 40%, transparent 92%);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 1;
        }

        #canvas-container canvas {
            display: block;
        }

        .scene-vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background:
                radial-gradient(circle at center, transparent 38%, rgba(0, 0, 0, 0.12) 72%, rgba(0, 0, 0, 0.58) 100%),
                linear-gradient(180deg, rgba(255, 204, 109, 0.05) 0%, transparent 20%, transparent 70%, rgba(2, 2, 5, 0.3) 100%);
            mix-blend-mode: screen;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            z-index: 10;
            pointer-events: none; /* Let interactions pass to canvas */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-shadow: 0 1px 18px rgba(0, 0, 0, 0.45);
        }

        .interactive-ui {
            pointer-events: auto; /* Re-enable for buttons */
        }

        .title-font { font-family: 'Playfair Display', serif; }

        .eyebrow {
            letter-spacing: 0.35em;
            text-transform: uppercase;
            font-size: 0.68rem;
            color: rgba(255, 236, 180, 0.82);
        }
        
        .glow-text {
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6), 0 0 30px rgba(255, 140, 0, 0.4);
        }

        .hero-glow {
            position: relative;
            display: inline-block;
        }

        .hero-glow::after {
            content: '';
            position: absolute;
            inset: -18px -26px;
            background: radial-gradient(circle, rgba(255, 219, 118, 0.18), transparent 70%);
            filter: blur(8px);
            z-index: -1;
        }

        .hero-title {
            font-size: clamp(2.25rem, 6vw, 4.75rem);
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            background-color: #030308;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease-in-out;
            background:
                radial-gradient(circle at center, rgba(255, 205, 91, 0.12), transparent 26%),
                linear-gradient(180deg, #05040b 0%, #020205 100%);
        }

        #loading-screen::before {
            content: '';
            position: absolute;
            inset: 10% 12%;
            border-radius: 999px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            box-shadow: 0 0 80px rgba(255, 184, 79, 0.12), inset 0 0 80px rgba(255, 184, 79, 0.08);
            filter: blur(1px);
        }

        .loader {
            width: 72px;
            height: 72px;
            border: 2px solid rgba(255, 215, 0, 0.14);
            border-top-color: #ffd700;
            border-right-color: rgba(255, 140, 0, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 24px rgba(255, 215, 0, 0.18), inset 0 0 20px rgba(255, 215, 0, 0.08);
            animation: spin 1.35s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .loader-stage {
            position: relative;
            width: 168px;
            height: 168px;
            display: grid;
            place-items: center;
            margin-bottom: 1.25rem;
        }

        .loader-aurora {
            position: absolute;
            inset: 18px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(255, 201, 96, 0.28), rgba(255, 111, 31, 0.05) 58%, transparent 72%);
            filter: blur(10px);
            animation: pulseHalo 2.8s ease-in-out infinite;
        }

        .loader-orbit {
            position: absolute;
            inset: 20px;
            border-radius: 999px;
            border: 1px solid rgba(255, 218, 120, 0.16);
            border-top-color: rgba(255, 224, 142, 0.85);
            border-right-color: rgba(255, 139, 57, 0.6);
            animation: spin 3.6s linear infinite;
        }

        .loader-orbit.orbit-reverse {
            inset: 32px;
            border-color: rgba(126, 208, 255, 0.14);
            border-bottom-color: rgba(125, 195, 255, 0.76);
            border-left-color: rgba(255, 213, 145, 0.42);
            animation-direction: reverse;
            animation-duration: 2.6s;
        }

        .loader-center {
            width: 76px;
            height: 76px;
            border-radius: 999px;
            background:
                radial-gradient(circle at 34% 32%, rgba(255, 252, 230, 0.85), rgba(255, 214, 102, 0.52) 40%, rgba(255, 107, 24, 0.2) 74%, rgba(0, 0, 0, 0.05) 100%);
            box-shadow:
                0 0 34px rgba(255, 194, 83, 0.35),
                inset 0 0 22px rgba(255, 255, 255, 0.18);
            animation: pulseCore 2.4s ease-in-out infinite;
        }

        .loading-specks {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .loading-specks span {
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 999px;
            background: rgba(255, 220, 128, 0.82);
            box-shadow: 0 0 12px rgba(255, 206, 94, 0.9);
            animation: twinkle 1.8s ease-in-out infinite;
        }

        .loading-specks span:nth-child(1) { top: 22%; left: 18%; animation-delay: 0s; }
        .loading-specks span:nth-child(2) { top: 14%; right: 24%; animation-delay: 0.45s; }
        .loading-specks span:nth-child(3) { bottom: 18%; left: 24%; animation-delay: 0.9s; }
        .loading-specks span:nth-child(4) { bottom: 24%; right: 20%; animation-delay: 1.3s; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        @keyframes pulseCore {
            0%, 100% { transform: scale(0.92); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        @keyframes pulseHalo {
            0%, 100% { transform: scale(0.95); opacity: 0.65; }
            50% { transform: scale(1.07); opacity: 1; }
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(0.8); opacity: 0.35; }
            50% { transform: scale(1.35); opacity: 1; }
        }

        @keyframes drift {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -6px, 0); }
        }

        .glass-panel {
            background: linear-gradient(180deg, rgba(24, 19, 34, 0.68), rgba(8, 8, 16, 0.46));
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid rgba(255, 226, 137, 0.16);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.26),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .panel-accent {
            position: relative;
            overflow: hidden;
        }

        .panel-accent::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.08) 48%, transparent 62%);
            transform: translateX(-140%);
            animation: drift 6s ease-in-out infinite;
            pointer-events: none;
        }

        @media (max-width: 768px), (pointer: coarse) {
            body {
                touch-action: manipulation;
            }

            #ui-layer {
                padding: 1rem;
            }

            #ui-layer header,
            #ui-layer > div:last-child {
                flex-direction: column;
                align-items: flex-start;
            }

            #ui-layer header {
                gap: 1rem;
            }

            #ui-layer header h1 {
                letter-spacing: -0.03em;
            }

            #ui-layer header > div,
            #ui-layer > div:last-child > div {
                max-width: 100%;
            }

            #ui-layer .hero-glow {
                max-width: 100%;
            }

            #ui-layer .hero-glow::after {
                inset: -12px -18px;
            }

            .glass-panel {
                backdrop-filter: blur(12px) saturate(115%);
                -webkit-backdrop-filter: blur(12px) saturate(115%);
            }

            body::before {
                filter: blur(18px);
                opacity: 0.62;
            }

            body::after {
                opacity: 0.08;
            }

            .loader-stage {
                width: 138px;
                height: 138px;
            }

            .loader-center {
                width: 62px;
                height: 62px;
            }
        }
        
    </style>
</head>
<body>

    <div class="scene-vignette"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-stage" aria-hidden="true">
            <div class="loader-aurora"></div>
            <div class="loader-orbit"></div>
            <div class="loader-orbit orbit-reverse"></div>
            <div class="loader-center"></div>
            <div class="loading-specks">
                <span></span><span></span><span></span><span></span>
            </div>
        </div>
        <h1 class="title-font text-4xl text-yellow-400 glow-text tracking-wider">VESAK 2568</h1>
        <p class="text-yellow-100/60 mt-3 text-sm tracking-[0.25em] uppercase" id="loading-text">Illuminating the path...</p>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="p-6 md:p-10">
        
        <!-- Header -->
        <header class="flex justify-between items-start w-full gap-6">
            <div class="max-w-2xl">
                <p class="eyebrow mb-3 hidden md:block">Sri Lankan Night Ritual</p>
                <h1 class="hero-glow hero-title title-font text-yellow-200 glow-text mb-3 leading-none">Vesak</h1>
                <p class="text-yellow-50/78 text-sm md:text-base max-w-lg hidden md:block leading-relaxed">
                   
                </p>
            </div>

            <!-- Controls (Audio) -->
            <div class="flex flex-col gap-3 items-end">
                <button id="audio-btn" class="interactive-ui w-12 h-12 rounded-full glass-panel panel-accent flex items-center justify-center text-yellow-200 hover:bg-white/10 hover:text-white transition-all shadow-[0_0_15px_rgba(255,215,0,0.2)]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                </button>
            </div>
        </header>

      
    </div>

    <!-- Load Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Load OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Load GLTFLoader for custom .glb support -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Post-Processing specific to Three r128 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        // Core Three.js variables
        let scene, camera, renderer, composer, controls;
        const clock = new THREE.Clock();
        
        // Scene entities for animation
        let lanterns = [];
        let pahanLamps = [];
        let customModels = [];
        let water;
        
        let fireflies;
        let skyLanterns = [];
        let fireworks = [];
        let lastFireworkTime = 0;
        let moonGlow;
        let horizonMist;
        let auroraBands = [];
        let distantSilhouette;
        let skyWisps = [];
        let flagPanels = [];
        let frameTick = 0;
        let isPageVisible = true;

        const isMobile = window.matchMedia('(max-width: 768px), (pointer: coarse)').matches;
        const sceneQuality = isMobile ? 0.58 : 1;
        const starCount = Math.max(900, Math.round(2000 * sceneQuality));
        const nearStarCount = Math.max(240, Math.round(900 * sceneQuality));
        const lanternCount = Math.max(12, Math.round(25 * sceneQuality));
        const lampCount = Math.max(24, Math.round(60 * sceneQuality));
        const fireflyCount = Math.max(80, Math.round(150 * sceneQuality));
        const fireworkMinGap = isMobile ? 4.5 : 3;
        const fireworkMaxGap = isMobile ? 8 : 7;
        const waterSegments = isMobile ? 22 : 50;
        const skyLanternCap = isMobile ? 18 : 36;
        const dynamicUpdateStride = isMobile ? 2 : 1;

        // Colors for Buddhist Flag / Lanterns (Blue, Yellow, Red, White, Orange)
        const buddhistColors = [
            0x0033cc, // Neela (Blue)
            0xffd700, // Peetha (Yellow)
            0xcc0000, // Lohitha (Red)
            0xffffff, // Odata (White)
            0xff8c00  // Manjestha (Orange)
        ];

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020208); // Deep night sky
            scene.fog = new THREE.FogExp2(0x020208, isMobile ? 0.01 : 0.012); // Atmospheric fog

            // 2. Camera setup
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 25);

            // 3. Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: !isMobile, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.25 : 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Crucial for beautiful glowing effects
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = isMobile ? 1.08 : 1.2;
            container.appendChild(renderer.domElement);

            // Post-Processing (UnrealBloomPass) to make lights glow
            const renderScene = new THREE.RenderPass(scene, camera);
            
            // Resolution, strength, radius, threshold
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                isMobile ? 1.05 : 1.5,   // Strength (High for Vesak)
                isMobile ? 0.55 : 0.8,   // Radius
                0.12                     // Threshold
            );

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            const cinematicPass = new THREE.ShaderPass({
                uniforms: {
                    tDiffuse: { value: null },
                    uStrength: { value: 0.28 },
                    uTime: { value: 0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform float uStrength;
                    uniform float uTime;
                    varying vec2 vUv;

                    void main() {
                        vec2 centered = vUv - 0.5;
                        vec4 color = texture2D(tDiffuse, vUv);
                        float vignette = smoothstep(0.92, 0.22, dot(centered, centered) * 2.0);
                        float warmLift = 0.03 + 0.02 * sin(uTime * 0.25);
                        color.rgb += warmLift * vec3(0.12, 0.08, 0.02);
                        color.rgb = mix(color.rgb, color.rgb * vec3(1.08, 1.0, 0.92), 0.22);
                        color.rgb *= 1.0 + uStrength * 0.08;
                        color.rgb *= mix(0.78, 1.0, vignette);
                        gl_FragColor = color;
                    }
                `
            });
            cinematicPass.renderToScreen = true;
            composer.addPass(cinematicPass);
            composer.userData = { cinematicPass };

            // 4. Orbit Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = isMobile ? 0.08 : 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.01; // Keep camera above water
            controls.minDistance = 2;
            controls.maxDistance = isMobile ? 58 : 80;
            controls.autoRotate = !isMobile;
            controls.autoRotateSpeed = isMobile ? 0.18 : 0.3;

            // 5. Lighting
            const ambientLight = new THREE.AmbientLight(0x111122, 0.8); // Soft moonlit ambient
            scene.add(ambientLight);

            const moonLight = new THREE.DirectionalLight(0x88bbff, 0.5);
            moonLight.position.set(-14, 45, -10);
            moonLight.castShadow = true;
            scene.add(moonLight);

            const warmKey = new THREE.PointLight(0xffc56b, 1.5, 65);
            warmKey.position.set(6, 14, 10);
            scene.add(warmKey);

            createCinematicAtmosphere();

            // Build the Sri Lankan environment
            createEnvironment();
            createBuddhistFlags();
            createStupa();
            createAtapattamLanterns();
            createMatiPahan();
            createFireflies(); // Add ambient magic
            
            // Load decorative lantern groups from local GLB
            loadLanternClusterGLB();

            // Setup Interactions
            setupRaycaster();
            setupAudio();

            // Handle Resize
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('visibilitychange', () => {
                isPageVisible = !document.hidden;
            });

            // Dismiss Loading Screen
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1500);
            }, 2500);

            // Start loop
            animate();
        }

        function createEnvironment() {
            createSkyBackdrop();

            // Starry Sky
            const starGeo = new THREE.BufferGeometry();
            const starMat = new THREE.PointsMaterial({
                color: 0xfff2c6, size: isMobile ? 0.14 : 0.18, transparent: true, opacity: 0.86
            });
            const starVerts = [];
            for (let i = 0; i < starCount; i++) {
                starVerts.push(
                    (Math.random() - 0.5) * 300,
                    Math.random() * 150 + 10, // Above ground
                    (Math.random() - 0.5) * 300
                );
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            const nearStarGeo = new THREE.BufferGeometry();
            const nearStarVerts = [];
            for (let i = 0; i < nearStarCount; i++) {
                nearStarVerts.push(
                    (Math.random() - 0.5) * 220,
                    30 + Math.random() * 120,
                    -20 - Math.random() * 220
                );
            }
            nearStarGeo.setAttribute('position', new THREE.Float32BufferAttribute(nearStarVerts, 3));
            const nearStars = new THREE.Points(nearStarGeo, new THREE.PointsMaterial({
                color: 0x8fd3ff,
                size: 0.08,
                transparent: true,
                opacity: 0.45,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            }));
            scene.add(nearStars);

            // Water Surface (Dark, reflective-looking plane)
            const waterGeo = new THREE.PlaneGeometry(200, 200, waterSegments, waterSegments);
            const waterMat = new THREE.MeshStandardMaterial({
                color: 0x020516,
                roughness: 0.08, // Shiny
                metalness: 0.88,
                transparent: true,
                opacity: 0.92,
                emissive: 0x02040a,
                emissiveIntensity: 0.18
            });
            water = new THREE.Mesh(waterGeo, waterMat);
            water.rotation.x = -Math.PI / 2;
            water.position.y = -1;
            
            // Store original vertices for wave animation
            water.userData.originalZ = [];
            const pos = water.geometry.attributes.position;
            for(let i=0; i<pos.count; i++) water.userData.originalZ.push(pos.getZ(i));
            
            scene.add(water);

            // Bank / Ground where Stupa is
            const bankGeo = new THREE.PlaneGeometry(200, 80);
            const bankMat = new THREE.MeshStandardMaterial({ color: 0x060806, roughness: 1, emissive: 0x020301, emissiveIntensity: 0.08 });
            const bank = new THREE.Mesh(bankGeo, bankMat);
            bank.rotation.x = -Math.PI / 2;
            bank.position.set(0, -0.9, -60);
            scene.add(bank);
        }

        function createSkyBackdrop() {
            const skyDome = new THREE.Mesh(
                new THREE.SphereGeometry(230, isMobile ? 22 : 30, isMobile ? 18 : 24),
                new THREE.MeshBasicMaterial({
                    color: 0x0b1a36,
                    transparent: true,
                    opacity: 0.24,
                    side: THREE.BackSide,
                    depthWrite: false
                })
            );
            scene.add(skyDome);

            const zenithGlow = new THREE.Mesh(
                new THREE.SphereGeometry(130, isMobile ? 18 : 24, isMobile ? 14 : 18),
                new THREE.MeshBasicMaterial({
                    color: 0x1f4878,
                    transparent: true,
                    opacity: 0.08,
                    side: THREE.BackSide,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                })
            );
            zenithGlow.position.y = 45;
            scene.add(zenithGlow);

            const moon = new THREE.Mesh(
                new THREE.SphereGeometry(4.8, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0xfef0c4 })
            );
            moon.position.set(35, 48, -150);
            scene.add(moon);

            moonGlow = new THREE.Mesh(
                new THREE.SphereGeometry(10, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0xffd98a, transparent: true, opacity: 0.08 })
            );
            moonGlow.position.copy(moon.position);
            scene.add(moonGlow);

            const haloGeo = new THREE.RingGeometry(7, 13, isMobile ? 40 : 64);
            const haloMat = new THREE.MeshBasicMaterial({ color: 0xffd98a, transparent: true, opacity: 0.06, side: THREE.DoubleSide });

        function loadLanternClusterGLB() {
            document.getElementById('loading-text').innerText = 'Loading Vesak lanterns...';

            gltfLoader.load(
                'vesak_lanterns.glb',
                function (gltf) {
                    const sourceCluster = gltf.scene;
                    sourceCluster.traverse((child) => {
                        if (!child.isMesh) return;
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.material) {
                            child.material = child.material.clone();
                            if ('emissiveIntensity' in child.material) {
                                child.material.emissiveIntensity = Math.max(child.material.emissiveIntensity || 0, 0.65);
                            }
                        }
                    });

                    const placements = [
                        { x: -18, y: -0.5, z: -34, s: 1.15, r: 0.2 },
                        { x: 16, y: -0.5, z: -33, s: 1.1, r: -0.25 }
                    ];

                    placements.forEach((p, index) => {
                        const cluster = sourceCluster.clone(true);
                        cluster.position.set(p.x, p.y, p.z);
                        cluster.rotation.y = p.r;
                        cluster.scale.setScalar(p.s);

                        cluster.traverse((child) => {
                            if (!child.isMesh || !child.material) return;
                            child.material = child.material.clone();
                        });

                        const localGlow = new THREE.PointLight(0xffcf82, isMobile ? 0.8 : 1.1, isMobile ? 14 : 20);
                        localGlow.position.set(0, 2.6, 0);
                        cluster.add(localGlow);

                        scene.add(cluster);
                        customModels.push({
                            mesh: cluster,
                            floatSpeed: 0.2 + Math.random() * 0.25,
                            baseY: p.y + (index % 2 === 0 ? 0 : 0.08)
                        });
                    });

                    console.log('Local Vesak lantern cluster loaded successfully.');
                },
                undefined,
                function (error) {
                    console.warn('Local vesak_lanterns.glb failed to load. Scene continues with procedural assets.', error);
                }
            );
        }

        function setupRaycaster() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();

            window.addEventListener('click', (event) => {
                // Ignore clicks on UI elements
                if (event.target.closest('.interactive-ui')) return;

                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);

                // Intersect lanterns
                const intersects = raycaster.intersectObjects(scene.children, true);
                let clickedLantern = false;
                
                for (let i = 0; i < intersects.length; i++) {
                    // Traverse up to find the group with userData
                    let obj = intersects[i].object;
                    while (obj.parent && !obj.userData.isLantern) {
                        if (obj === scene) break;
                        obj = obj.parent;
                    }

                    if (obj.userData && obj.userData.isLantern) {
                        // Change color to a random Buddhist flag color
                        const newColorHex = buddhistColors[Math.floor(Math.random() * buddhistColors.length)];
                        const newColor = new THREE.Color(newColorHex);
                        
                        obj.userData.shell.material.color.copy(newColor);
                        obj.userData.shell.material.emissive.copy(newColor);
                        obj.userData.light.color.copy(newColor);
                        obj.userData.frillMat.color.copy(newColor);
                        
                        // Give it a little spin boost
                        obj.userData.speed += 2;
                        clickedLantern = true;
                        break; // Only click one
                    }
                }

                // If the user clicked empty space, release a sky lantern!
                if (!clickedLantern) {
                    raycaster.ray.intersectPlane(groundPlane, target);
                    if (target) {
                        // Limit spawn range so they don't spawn behind the camera too much
                        if (target.z > 10) target.z = 10;
                        spawnSkyLantern(target);
                    }
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.05);
            const time = clock.elapsedTime;

            if (!isPageVisible) {
                return;
            }

            controls.update();

            frameTick++;

            // Animate Water ripples
            if (water) {
                const pos = water.geometry.attributes.position;
                const origZ = water.userData.originalZ;
                if (frameTick % dynamicUpdateStride === 0) {
                    for(let i=0; i<pos.count; i++) {
                        const x = pos.getX(i);
                        const y = pos.getY(i);
                        // Simple sine wave displacement
                        const offset = Math.sin(x * 0.2 + time) * (isMobile ? 0.07 : 0.1) + Math.cos(y * 0.2 + time * 0.8) * (isMobile ? 0.07 : 0.1);
                        pos.setZ(i, origZ[i] + offset);
                    }
                    pos.needsUpdate = true;
                }
                if (!isMobile || frameTick % 3 === 0) {
                    water.geometry.computeVertexNormals(); // Update lighting on water
                }
            }

            if (moonGlow) {
                moonGlow.scale.setScalar(1 + Math.sin(time * 0.6) * 0.025);
            }

            if (horizonMist) {
                horizonMist.children.forEach((mist, index) => {
                    mist.position.y = 3 + Math.sin(time * 0.2 + index) * 0.5;
                    mist.position.x += Math.sin(time * 0.05 + index) * 0.01;
                });
            }

            auroraBands.forEach((band, index) => {
                band.material.opacity = 0.045 + Math.max(0, Math.sin(time * band.userData.speed + band.userData.phase)) * 0.035;
                band.position.y = 24 + index * 2 + Math.sin(time * 0.12 + band.userData.phase) * 1.2;
            });

            if (distantSilhouette) {
                distantSilhouette.rotation.y = Math.sin(time * 0.03) * 0.04;
            }

            skyWisps.forEach((wisp) => {
                const d = wisp.userData;
                wisp.position.x = d.baseX + Math.sin(time * d.drift + d.phase) * 4.5;
                wisp.position.y = d.baseY + Math.cos(time * (d.drift * 0.8) + d.phase) * 1.4;
                wisp.material.opacity = 0.03 + Math.max(0, Math.sin(time * 0.5 + d.phase)) * 0.035;
            });

            flagPanels.forEach((panel) => {
                const d = panel.userData;
                panel.rotation.z = Math.sin(time * 3.1 + d.phase) * 0.13 * d.sway;
                panel.rotation.y = Math.cos(time * 2.3 + d.phase) * 0.08 * d.side;
                panel.position.y = d.baseY + Math.sin(time * 3.8 + d.phase) * 0.02;
            });

            // Animate Atapattam (Lanterns)
            lanterns.forEach(group => {
                const d = group.userData;
                // Bobbing up and down
                group.position.y = d.baseY + Math.sin(time * d.speed + d.offset) * 0.5;
                // Spinning slowly (spin decays back to normal if clicked)
                if(d.speed > 1.5) d.speed -= 0.02; // decay click boost
                group.rotation.y += 0.01 * d.speed;
                
                // Swing frills
                for(let i=3; i<7; i++) { // Frills are children 3 to 6
                    if(group.children[i]) {
                        group.children[i].rotation.x = Math.sin(time * 2 + d.offset) * 0.2;
                    }
                }
            });

            // Animate Mati Pahan (Clay Lamps)
            pahanLamps.forEach(group => {
                const d = group.userData;
                // Drift slightly
                group.position.x = d.baseX + Math.sin(time * d.speed) * 0.5;
                group.position.z = d.baseZ + Math.cos(time * d.speed) * 0.5;
                // Bob on water surface
                group.position.y = -1 + 0.05 + Math.sin(group.position.x * 0.2 + time) * 0.1;
                // Flicker flame
                const flicker = 1 + Math.sin(time * 20 * d.flickerSpeed) * 0.2;
                d.flame.scale.set(1, flicker, 1);
                d.light.intensity = 0.8 * flicker;
            });

            // Animate Custom GLB Models
            customModels.forEach(data => {
                if (data.mesh && data.baseY !== undefined) {
                    // Gentle floating hover
                    data.mesh.position.y = data.baseY + Math.sin(time * data.floatSpeed) * 0.2;
                    data.mesh.rotation.y += 0.005;
                }
            });

            // Animate Fireflies (Ambient glowing bugs)
            if (fireflies && frameTick % dynamicUpdateStride === 0) {
                const pos = fireflies.geometry.attributes.position;
                const phases = fireflies.userData.phases;
                const bases = fireflies.userData.bases;
                for(let i=0; i<pos.count; i++) {
                    const baseIndex = i * 3;
                    pos.setX(i, bases[baseIndex] + Math.cos(time + phases[i]) * 0.8);
                    pos.setY(i, bases[baseIndex + 1] + Math.sin(time * 1.8 + phases[i]) * 0.45);
                    pos.setZ(i, bases[baseIndex + 2] + Math.sin(time * 0.8 + phases[i]) * 0.8);
                }
                pos.needsUpdate = true;
            }

            // Animate Interactive Sky Lanterns (Salli Koodu)
            for (let i = skyLanterns.length - 1; i >= 0; i--) {
                const l = skyLanterns[i];
                l.mesh.position.y += l.speedY; // Float up
                l.mesh.position.x += Math.sin(time * l.wobbleSpeed + l.wobbleOffset) * 0.02; // Wind wobble
                l.mesh.position.z += Math.cos(time * l.wobbleSpeed + l.wobbleOffset) * 0.02;
                
                // Remove when they get too high
                if (l.mesh.position.y > 70) {
                    scene.remove(l.mesh);
                    // Dispose to prevent memory leaks
                    l.mesh.geometry.dispose();
                    l.mesh.material.dispose();
                    skyLanterns.splice(i, 1);
                }
            }

            // Occasional Fireworks in the distant sky
            if (time - lastFireworkTime > (fireworkMinGap + Math.random() * (fireworkMaxGap - fireworkMinGap)) && fireworks.length < (isMobile ? 2 : 4)) {
                launchFirework();
                lastFireworkTime = time;
            }

            // Animate active Fireworks
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const fw = fireworks[i];
                fw.age += delta;
                const step = delta * 60;
                
                const pos = fw.points.geometry.attributes.position;
                const vel = fw.points.geometry.attributes.velocity;
                
                for(let j=0; j<pos.count; j++) {
                    // Update positions based on velocity
                    pos.setX(j, pos.getX(j) + vel.getX(j) * step);
                    pos.setY(j, pos.getY(j) + vel.getY(j) * step - 0.005 * step); // Subtle gravity arc
                    pos.setZ(j, pos.getZ(j) + vel.getZ(j) * step);
                    
                    // Air resistance / slow down
                    const drag = Math.pow(0.94, step);
                    vel.setX(j, vel.getX(j) * drag);
                    vel.setY(j, vel.getY(j) * drag);
                    vel.setZ(j, vel.getZ(j) * drag);
                }
                pos.needsUpdate = true;
                
                // Fade out as they age
                fw.points.material.opacity = 1 - (fw.age / fw.maxAge);
                
                if (fw.age >= fw.maxAge) {
                    scene.remove(fw.points);
                    fw.points.geometry.dispose();
                    fw.points.material.dispose();
                    fireworks.splice(i, 1);
                }
            }

            if (composer.userData && composer.userData.cinematicPass) {
                composer.userData.cinematicPass.uniforms.uTime.value = time;
            }

            // Render via composer for Bloom!
            composer.render();
        }

        // Initialize on load
        window.onload = init;

    </script>
</body>
