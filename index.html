<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sri Lankan Vesak - 3D Experience</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020205;
            font-family: 'Inter', sans-serif;
            touch-action: none; /* Prevent pinch zoom on mobile */
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let interactions pass to canvas */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .interactive-ui {
            pointer-events: auto; /* Re-enable for buttons */
        }

        .title-font { font-family: 'Playfair Display', serif; }
        
        .glow-text {
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6), 0 0 30px rgba(255, 140, 0, 0.4);
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #030308;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease-in-out;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 215, 0, 0.2);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .glass-panel {
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader mb-6"></div>
        <h1 class="title-font text-4xl text-yellow-400 glow-text tracking-wider">VESAK 2568</h1>
        <p class="text-yellow-100/60 mt-3 text-sm tracking-widest uppercase" id="loading-text">Illuminating the path...</p>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="p-6 md:p-10">
        
        <!-- Header -->
        <header class="flex justify-between items-start w-full">
            <div>
                <h1 class="title-font text-4xl md:text-6xl text-yellow-300 glow-text mb-2">Vesak</h1>
                <p class="text-yellow-100/80 text-sm md:text-base max-w-md hidden md:block">
                    Experience the serenity of a Sri Lankan Vesak night. 
                    Explore the Thorana, Atapattam lanterns, and the Stupa.
                </p>
            </div>

            <!-- Controls (Audio & GLB Upload) -->
            <div class="flex flex-col gap-3 items-end">
                <button id="audio-btn" class="interactive-ui w-12 h-12 rounded-full glass-panel flex items-center justify-center text-yellow-200 hover:bg-white/10 hover:text-white transition-all shadow-[0_0_15px_rgba(255,215,0,0.2)]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                    </svg>
                </button>

                <!-- Custom GLB Upload Button -->
                <label class="interactive-ui mt-2 group cursor-pointer flex items-center gap-2 glass-panel px-4 py-2 rounded-full hover:bg-white/10 transition-all border border-yellow-500/30 hover:border-yellow-400/60">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-yellow-400 group-hover:scale-110 transition-transform">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <span class="text-xs text-yellow-100 font-medium tracking-wide">Upload Custom .GLB</span>
                    <input type="file" id="glb-upload" accept=".glb,.gltf" />
                </label>
            </div>
        </header>

        <!-- Footer / Interaction Hint -->
        <div class="w-full flex justify-between items-end">
            <div class="glass-panel px-4 py-2 rounded-lg inline-block interactive-ui cursor-help">
                <p class="text-xs text-yellow-100/70">
                    <span class="hidden md:inline">Click lanterns to change colors • Drag to rotate • Scroll to zoom</span>
                    <span class="inline md:hidden">Touch lanterns • Drag to explore</span>
                </p>
            </div>
            
            <div id="upload-status" class="text-xs text-green-400 opacity-0 transition-opacity duration-300 bg-black/50 px-3 py-1 rounded-md">
                Model loaded successfully!
            </div>
        </div>
    </div>

    <!-- Load Three.js Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Load OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Load GLTFLoader for custom .glb support -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <!-- Post-Processing specific to Three r128 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        // Core Three.js variables
        let scene, camera, renderer, composer, controls;
        const clock = new THREE.Clock();
        
        // Scene entities for animation
        let lanterns = [];
        let pahanLamps = [];
        let thoranaBulbs = [];
        let customModels = [];
        let water;

        // Colors for Buddhist Flag / Lanterns (Blue, Yellow, Red, White, Orange)
        const buddhistColors = [
            0x0033cc, // Neela (Blue)
            0xffd700, // Peetha (Yellow)
            0xcc0000, // Lohitha (Red)
            0xffffff, // Odata (White)
            0xff8c00  // Manjestha (Orange)
        ];

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020208); // Deep night sky
            scene.fog = new THREE.FogExp2(0x020208, 0.012); // Atmospheric fog

            // 2. Camera setup
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 25);

            // 3. Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Crucial for beautiful glowing effects
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // Post-Processing (UnrealBloomPass) to make lights glow
            const renderScene = new THREE.RenderPass(scene, camera);
            
            // Resolution, strength, radius, threshold
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5,   // Strength (High for Vesak)
                0.8,   // Radius
                0.1    // Threshold
            );

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // 4. Orbit Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.01; // Keep camera above water
            controls.minDistance = 2;
            controls.maxDistance = 80;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.3;

            // 5. Lighting
            const ambientLight = new THREE.AmbientLight(0x111122, 0.8); // Soft moonlit ambient
            scene.add(ambientLight);

            const moonLight = new THREE.DirectionalLight(0x88bbff, 0.5);
            moonLight.position.set(-20, 40, -20);
            moonLight.castShadow = true;
            scene.add(moonLight);

            // Build the Sri Lankan environment
            createEnvironment();
            createStupa();
            createThorana();
            createAtapattamLanterns();
            createMatiPahan();
            
            // Load a sample GLB model to fulfill requirement immediately
            loadSampleExternalGLB();

            // Setup Interactions
            setupRaycaster();
            setupAudio();
            setupCustomGLBUpload();

            // Handle Resize
            window.addEventListener('resize', onWindowResize);

            // Dismiss Loading Screen
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 1500);
            }, 2500);

            // Start loop
            animate();
        }

        function createEnvironment() {
            // Starry Sky
            const starGeo = new THREE.BufferGeometry();
            const starMat = new THREE.PointsMaterial({
                color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8
            });
            const starVerts = [];
            for (let i = 0; i < 2000; i++) {
                starVerts.push(
                    (Math.random() - 0.5) * 300,
                    Math.random() * 150 + 10, // Above ground
                    (Math.random() - 0.5) * 300
                );
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // Water Surface (Dark, reflective-looking plane)
            const waterGeo = new THREE.PlaneGeometry(200, 200, 50, 50);
            const waterMat = new THREE.MeshStandardMaterial({
                color: 0x010515,
                roughness: 0.1, // Shiny
                metalness: 0.8,
                transparent: true,
                opacity: 0.95
            });
            water = new THREE.Mesh(waterGeo, waterMat);
            water.rotation.x = -Math.PI / 2;
            water.position.y = -1;
            
            // Store original vertices for wave animation
            water.userData.originalZ = [];
            const pos = water.geometry.attributes.position;
            for(let i=0; i<pos.count; i++) water.userData.originalZ.push(pos.getZ(i));
            
            scene.add(water);

            // Bank / Ground where Stupa is
            const bankGeo = new THREE.PlaneGeometry(200, 80);
            const bankMat = new THREE.MeshStandardMaterial({ color: 0x050a05, roughness: 1 });
            const bank = new THREE.Mesh(bankGeo, bankMat);
            bank.rotation.x = -Math.PI / 2;
            bank.position.set(0, -0.9, -60);
            scene.add(bank);
        }

        function createStupa() {
            const stupaGroup = new THREE.Group();
            stupaGroup.position.set(0, -1, -50);

            const whiteMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, roughness: 0.8, metalness: 0.1 
            });

            // Base terraces (Pesa Walalu)
            for(let i=0; i<3; i++) {
                const cyl = new THREE.Mesh(new THREE.CylinderGeometry(18 - i*1.5, 18 - i*1.5, 1, 32), whiteMat);
                cyl.position.y = i * 1;
                stupaGroup.add(cyl);
            }

            // Dome (Garbhaya)
            const domeGeo = new THREE.SphereGeometry(15, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
            const dome = new THREE.Mesh(domeGeo, whiteMat);
            dome.position.y = 2.5;
            dome.scale.set(1, 0.9, 1); // Slight flatten
            stupaGroup.add(dome);

            // Square section (Hathares Kotuwa)
            const squareGeo = new THREE.BoxGeometry(6, 4, 6);
            const square = new THREE.Mesh(squareGeo, whiteMat);
            square.position.y = 18;
            stupaGroup.add(square);

            // Spire base (Devatha Kotuwa)
            const cyl2 = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.5, 2, 16), whiteMat);
            cyl2.position.y = 21;
            stupaGroup.add(cyl2);

            // Spire (Koth Kerella)
            const spireGeo = new THREE.ConeGeometry(2.5, 12, 16);
            const spire = new THREE.Mesh(spireGeo, whiteMat);
            spire.position.y = 28;
            stupaGroup.add(spire);

            // Crystal (Chudamanikya) - Glowing
            const crystalMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            const crystal = new THREE.Mesh(new THREE.OctahedronGeometry(1.2), crystalMat);
            crystal.position.y = 34.5;
            stupaGroup.add(crystal);

            // Crystal Light
            const cLight = new THREE.PointLight(0xffd700, 2, 60);
            cLight.position.y = 35;
            stupaGroup.add(cLight);

            scene.add(stupaGroup);
        }

        function createThorana() {
            const thoranaGroup = new THREE.Group();
            thoranaGroup.position.set(-40, 5, -45);
            thoranaGroup.rotation.y = Math.PI / 6;

            // Structure (Backing)
            const structureMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            
            // Arch shape (Semi-circle approximation)
            const mainBoard = new THREE.Mesh(new THREE.BoxGeometry(20, 15, 0.5), structureMat);
            mainBoard.position.y = 10;
            thoranaGroup.add(mainBoard);
            
            const arch = new THREE.Mesh(new THREE.CylinderGeometry(10, 10, 0.5, 32, 1, false, 0, Math.PI), structureMat);
            arch.rotation.x = Math.PI / 2;
            arch.position.y = 17.5;
            thoranaGroup.add(arch);

            // Add thousands of "bulbs" (InstancedMesh for performance)
            const bulbGeo = new THREE.SphereGeometry(0.2, 8, 8);
            
            // To make bulbs glow brightly and be picked up by Bloom, use MeshBasicMaterial
            const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            const numBulbs = 300;
            const instancedBulbs = new THREE.InstancedMesh(bulbGeo, bulbMat, numBulbs);
            
            const dummy = new THREE.Object3D();
            const colors = [];

            let bulbIdx = 0;
            
            // Outline the arch
            for(let i=0; i<60; i++) {
                const angle = (i / 59) * Math.PI;
                dummy.position.set(Math.cos(angle)*10, 17.5 + Math.sin(angle)*10, 0.5);
                dummy.updateMatrix();
                instancedBulbs.setMatrixAt(bulbIdx, dummy.matrix);
                colors.push(new THREE.Color(buddhistColors[i % 5]));
                bulbIdx++;
            }

            // Fill the board with random grid bulbs
            for(; bulbIdx < numBulbs; bulbIdx++) {
                dummy.position.set((Math.random()-0.5)*18, 5 + Math.random()*10, 0.5);
                dummy.updateMatrix();
                instancedBulbs.setMatrixAt(bulbIdx, dummy.matrix);
                colors.push(new THREE.Color(buddhistColors[Math.floor(Math.random() * 5)]));
            }

            // Set colors
            const colorArray = new Float32Array(numBulbs * 3);
            for(let i=0; i<numBulbs; i++) {
                colors[i].toArray(colorArray, i*3);
            }
            instancedBulbs.instanceColor = new THREE.InstancedBufferAttribute(colorArray, 3);
            
            // Add a strong point light to represent the overall glow of the Thorana
            const tLight = new THREE.PointLight(0xffaaff, 1, 40);
            tLight.position.set(0, 12, 5);
            thoranaGroup.add(tLight);

            thoranaGroup.add(instancedBulbs);
            
            // Store for animation
            thoranaGroup.userData = { instancedMesh: instancedBulbs, colors: colors };
            scene.add(thoranaGroup);
        }

        function createAtapattamLanterns() {
            const numLanterns = 25;
            const lanternGeo = new THREE.OctahedronGeometry(1.2, 0);
            // Elongate to look like a Kooduwa
            lanternGeo.scale(1, 1.3, 1);

            for (let i = 0; i < numLanterns; i++) {
                const group = new THREE.Group();
                const colorHex = buddhistColors[Math.floor(Math.random() * buddhistColors.length)];
                
                // Outer shell (transparent glowing)
                const shellMat = new THREE.MeshStandardMaterial({
                    color: colorHex,
                    emissive: colorHex,
                    emissiveIntensity: 0.6,
                    transparent: true,
                    opacity: 0.8,
                    side: THREE.DoubleSide
                });
                
                // Add wireframe to represent bamboo frame
                const frameMat = new THREE.MeshBasicMaterial({ color: 0x000000, wireframe: true });
                
                const shell = new THREE.Mesh(lanternGeo, shellMat);
                const frame = new THREE.Mesh(lanternGeo, frameMat);
                
                // Light inside
                const light = new THREE.PointLight(colorHex, 1.5, 15);

                group.add(shell);
                group.add(frame);
                group.add(light);

                // Add frills (Rella)
                const frillMat = new THREE.MeshBasicMaterial({ color: colorHex, side: THREE.DoubleSide });
                for(let f=0; f<4; f++) {
                    const frill = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 2), frillMat);
                    const angle = (f/4) * Math.PI * 2;
                    frill.position.set(Math.cos(angle), -1.5, Math.sin(angle));
                    frill.userData.baseRotY = angle;
                    frill.rotation.y = angle;
                    group.add(frill);
                }

                // Random placement in trees/air
                const radius = 10 + Math.random() * 30;
                const theta = Math.random() * Math.PI * 2;
                group.position.set(
                    Math.cos(theta) * radius,
                    4 + Math.random() * 8,
                    Math.sin(theta) * radius - 10
                );

                // Animation parameters
                group.userData = {
                    baseY: group.position.y,
                    speed: Math.random() * 1 + 0.5,
                    offset: Math.random() * Math.PI * 2,
                    isLantern: true, // For raycaster
                    shell: shell,
                    light: light,
                    frillMat: frillMat
                };

                scene.add(group);
                lanterns.push(group);
            }
        }

        function createMatiPahan() {
            const numLamps = 60;
            const clayMat = new THREE.MeshStandardMaterial({ color: 0x8b4513, roughness: 1 });
            const flameMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            
            for(let i=0; i<numLamps; i++) {
                const group = new THREE.Group();
                
                // Base
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.2, 0.1, 16), clayMat);
                group.add(base);

                // Flame
                const flame = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 8), flameMat);
                flame.position.y = 0.15;
                group.add(flame);

                // Light
                const light = new THREE.PointLight(0xff9900, 0.8, 5);
                light.position.y = 0.2;
                group.add(light);

                const radius = Math.random() * 25;
                const theta = Math.random() * Math.PI * 2;
                group.position.set(
                    Math.cos(theta) * radius,
                    -1 + 0.05, // Just above water
                    Math.sin(theta) * radius
                );

                group.userData = {
                    baseX: group.position.x,
                    baseZ: group.position.z,
                    speed: Math.random() * 0.5 + 0.1,
                    flame: flame,
                    light: light,
                    flickerSpeed: Math.random() * 0.2 + 0.1
                };

                scene.add(group);
                pahanLamps.push(group);
            }
        }

        // Set up the GLTF Loader once
        const gltfLoader = new THREE.GLTFLoader();

        function loadSampleExternalGLB() {
            document.getElementById('loading-text').innerText = "Loading 3D Models (.glb)...";
            
            // Using a very small, reliable public GLTF (A simple low-poly tree from Three.js examples repository or Khronos)
            // Note: External links in codepens/sandboxes sometimes fail due to CORS. 
            // If it fails, we catch it silently so the beautiful scene isn't ruined.
            const sampleUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF/Lantern.gltf';

            gltfLoader.load(
                sampleUrl,
                function (gltf) {
                    const model = gltf.scene;
                    // Position the sample model near the stupa
                    model.position.set(15, -1, -25);
                    
                    // Scale it properly (Khronos lantern is small)
                    model.scale.set(0.1, 0.1, 0.1);
                    
                    // Apply glowing material to the lantern body if possible
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.material.emissiveIntensity = 2;
                            child.castShadow = true;
                        }
                    });

                    // Add a point light to it
                    const pLight = new THREE.PointLight(0xffdd88, 2, 20);
                    pLight.position.y = 2;
                    model.add(pLight);

                    scene.add(model);
                    customModels.push({ mesh: model, floatSpeed: 0.5 });
                    
                    console.log("Sample GLB loaded successfully.");
                },
                undefined, // Progress callback
                function (error) {
                    console.warn("External GLB could not be loaded (likely CORS or network). The scene will continue with procedural assets.", error);
                    // Silently fail, procedural assets are already beautiful
                }
            );
        }

        function setupCustomGLBUpload() {
            const uploadInput = document.getElementById('glb-upload');
            const statusDiv = document.getElementById('upload-status');

            uploadInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                // Create a local Object URL for the uploaded file
                const url = URL.createObjectURL(file);
                
                statusDiv.innerText = "Loading your model...";
                statusDiv.className = "text-xs text-yellow-400 bg-black/50 px-3 py-1 rounded-md transition-opacity duration-300";
                statusDiv.style.opacity = '1';

                gltfLoader.load(
                    url,
                    function (gltf) {
                        const model = gltf.scene;
                        
                        // Place it right in front of the camera
                        const dir = new THREE.Vector3();
                        camera.getWorldDirection(dir);
                        const pos = camera.position.clone().add(dir.multiplyScalar(5));
                        
                        // Ensure it's not below ground
                        pos.y = Math.max(0, pos.y); 
                        model.position.copy(pos);
                        
                        // Auto-scale it so it's not too huge or tiny (simple bounding box approach)
                        const box = new THREE.Box3().setFromObject(model);
                        const size = box.getSize(new THREE.Vector3()).length();
                        const scaleFactor = 3 / size; // Target size roughly 3 units
                        model.scale.set(scaleFactor, scaleFactor, scaleFactor);

                        scene.add(model);
                        
                        // Add some floating animation to custom models
                        customModels.push({ mesh: model, floatSpeed: Math.random() + 0.5, baseY: pos.y });

                        // Show success message
                        statusDiv.innerText = "Model loaded & placed!";
                        statusDiv.className = "text-xs text-green-400 bg-black/50 px-3 py-1 rounded-md transition-opacity duration-300";
                        
                        setTimeout(() => { statusDiv.style.opacity = '0'; }, 3000);
                        
                        // Revoke URL to free memory
                        URL.revokeObjectURL(url);
                    },
                    undefined,
                    function (error) {
                        console.error("Error loading custom GLB", error);
                        statusDiv.innerText = "Error loading model. Must be .glb or .gltf";
                        statusDiv.className = "text-xs text-red-400 bg-black/50 px-3 py-1 rounded-md transition-opacity duration-300";
                        setTimeout(() => { statusDiv.style.opacity = '0'; }, 3000);
                        URL.revokeObjectURL(url);
                    }
                );
            });
        }

        function setupRaycaster() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            window.addEventListener('click', (event) => {
                // Ignore clicks on UI elements
                if (event.target.closest('.interactive-ui')) return;

                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);

                // Intersect lanterns
                const intersects = raycaster.intersectObjects(scene.children, true);
                
                for (let i = 0; i < intersects.length; i++) {
                    // Traverse up to find the group with userData
                    let obj = intersects[i].object;
                    while (obj.parent && !obj.userData.isLantern) {
                        if (obj === scene) break;
                        obj = obj.parent;
                    }

                    if (obj.userData && obj.userData.isLantern) {
                        // Change color to a random Buddhist flag color
                        const newColorHex = buddhistColors[Math.floor(Math.random() * buddhistColors.length)];
                        const newColor = new THREE.Color(newColorHex);
                        
                        obj.userData.shell.material.color.copy(newColor);
                        obj.userData.shell.material.emissive.copy(newColor);
                        obj.userData.light.color.copy(newColor);
                        obj.userData.frillMat.color.copy(newColor);
                        
                        // Give it a little spin boost
                        obj.userData.speed += 2;
                        break; // Only click one
                    }
                }
            });
        }

        function setupAudio() {
            let isPlaying = false;
            let audioCtx, osc, gainNode, filter;

            document.getElementById('audio-btn').addEventListener('click', function() {
                const btn = this;
                
                if (!isPlaying) {
                    if (!audioCtx) {
                        // Create a procedural deep ambient "Om/Chant" sound using oscillators
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        
                        osc = audioCtx.createOscillator();
                        osc.type = 'sawtooth';
                        osc.frequency.value = 65.41; // C2 note, deep drone
                        
                        // LFO for chanting/pulsing effect
                        const lfo = audioCtx.createOscillator();
                        lfo.type = 'sine';
                        lfo.frequency.value = 0.2; 
                        
                        const lfoGain = audioCtx.createGain();
                        lfoGain.gain.value = 5;
                        lfo.connect(lfoGain);
                        lfoGain.connect(osc.frequency);
                        lfo.start();

                        // Filter to make it sound like a distant chant / bowl
                        filter = audioCtx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.value = 200;
                        filter.Q.value = 5;
                        
                        // LFO for filter sweep
                        const lfo2 = audioCtx.createOscillator();
                        lfo2.type = 'sine';
                        lfo2.frequency.value = 0.1;
                        const lfoGain2 = audioCtx.createGain();
                        lfoGain2.gain.value = 100;
                        lfo2.connect(lfoGain2);
                        lfoGain2.connect(filter.frequency);
                        lfo2.start();

                        gainNode = audioCtx.createGain();
                        gainNode.gain.value = 0;

                        osc.connect(filter);
                        filter.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        osc.start();
                    }

                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    
                    gainNode.gain.setTargetAtTime(0.15, audioCtx.currentTime, 1); // Fade in
                    
                    btn.classList.add('bg-yellow-500/20', 'text-yellow-400');
                    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>`;
                    isPlaying = true;
                } else {
                    if (gainNode) {
                        gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5); // Fade out
                    }
                    btn.classList.remove('bg-yellow-500/20', 'text-yellow-400');
                    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
                    isPlaying = false;
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            controls.update();

            // Animate Water ripples
            if (water) {
                const pos = water.geometry.attributes.position;
                const origZ = water.userData.originalZ;
                for(let i=0; i<pos.count; i++) {
                    const x = pos.getX(i);
                    const y = pos.getY(i);
                    // Simple sine wave displacement
                    const offset = Math.sin(x * 0.2 + time) * 0.1 + Math.cos(y * 0.2 + time * 0.8) * 0.1;
                    pos.setZ(i, origZ[i] + offset);
                }
                pos.needsUpdate = true;
                water.geometry.computeVertexNormals(); // Update lighting on water
            }

            // Animate Atapattam (Lanterns)
            lanterns.forEach(group => {
                const d = group.userData;
                // Bobbing up and down
                group.position.y = d.baseY + Math.sin(time * d.speed + d.offset) * 0.5;
                // Spinning slowly (spin decays back to normal if clicked)
                if(d.speed > 1.5) d.speed -= 0.02; // decay click boost
                group.rotation.y += 0.01 * d.speed;
                
                // Swing frills
                for(let i=3; i<7; i++) { // Frills are children 3 to 6
                    if(group.children[i]) {
                        group.children[i].rotation.x = Math.sin(time * 2 + d.offset) * 0.2;
                    }
                }
            });

            // Animate Mati Pahan (Clay Lamps)
            pahanLamps.forEach(group => {
                const d = group.userData;
                // Drift slightly
                group.position.x = d.baseX + Math.sin(time * d.speed) * 0.5;
                group.position.z = d.baseZ + Math.cos(time * d.speed) * 0.5;
                // Bob on water surface
                group.position.y = -1 + 0.05 + Math.sin(group.position.x * 0.2 + time) * 0.1;
                // Flicker flame
                const flicker = 1 + Math.sin(time * 20 * d.flickerSpeed) * 0.2;
                d.flame.scale.set(1, flicker, 1);
                d.light.intensity = 0.8 * flicker;
            });

            // Animate Thorana (Pandol Lights flashing)
            scene.children.forEach(child => {
                if(child.userData && child.userData.instancedMesh) {
                    const iMesh = child.userData.instancedMesh;
                    const colors = child.userData.colors;
                    
                    // Simple pattern: rotate colors based on time
                    const offset = Math.floor(time * 5); 
                    const dummyColor = new THREE.Color();
                    const colorArray = iMesh.instanceColor.array;
                    
                    for(let i=0; i<colors.length; i++) {
                        // Create a chase effect
                        const activeIdx = (i + offset) % buddhistColors.length;
                        dummyColor.setHex(buddhistColors[activeIdx]);
                        dummyColor.toArray(colorArray, i*3);
                    }
                    iMesh.instanceColor.needsUpdate = true;
                }
            });

            // Animate Custom GLB Models
            customModels.forEach(data => {
                if (data.mesh && data.baseY !== undefined) {
                    // Gentle floating hover
                    data.mesh.position.y = data.baseY + Math.sin(time * data.floatSpeed) * 0.2;
                    data.mesh.rotation.y += 0.005;
                }
            });

            // Render via composer for Bloom!
            composer.render();
        }

        // Initialize on load
        window.onload = init;

    </script>
</body>
